<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../public/css/global.css">
  <link rel="stylesheet" href="../../public/css/index.css">
  <link rel="stylesheet" href="../../public/css/user_dropdown.css">
  <link rel="stylesheet" href="../../public/css/project/top_bar_project.css">
  <link rel="stylesheet" href="../../public/css/project/dropdown_members.css">
  <link rel="stylesheet" href="../../public/css/notification.css">
  <link rel="stylesheet" href="../../public/css/loading.css">
  <link href="https://css.gg/css" rel="stylesheet" />
  <title>Document</title>
</head>

<body>
  <header>
    <div class="logo">
      <img src="../../public/assets/jupiter_logo.png" />
    </div>
    <div class="user-options">
      <div class="dropdown_user">
        <ul>
          <li class="user"></li>
          <li><button class="config">Configurações<i class="gg-menu"></i></button></li>
          <li><button class="logout" onclick="logout()">Sair<i class="gg-log-off"></i></button></li>
        </ul>
      </div>
    </div>
  </header>
  <div class="top_bar_project">
    <button class="button btn_add_group"><i class="gg-card-clubs"></i>Criar Grupo</button>
    </button>
    <button class="count_members">
      <i class="gg-user"></i>
      <div class="dropdown_members">
        <ul class="members">
        </ul>
      </div>
    </button>
  </div>
  <main>
    <section class="groups">

    </section>
  </main>
  <div class="form_container group">
    <div class="overlay"></div>
    <div class="container_form_group">
      <img src="../../public/assets/jupiter_logo.png" />
      <h3>Criar Projeto</h3>
      <form class="form_group" action="/" method="POST">
        <fieldset>
          <input type="text" name="name" placeholder="Nome do Grupo" required />
        </fieldset>
        <input type="hidden" value="" name="projectId" class="input_projectid" />
        <button class="button" type="submit">Criar Grupo</button>
      </form>
    </div>
  </div>
  <div class="form_container member_container_form">
    <div class="overlay"></div>
    <div class="container_form_member">
      <img src="../../public/assets/jupiter_logo.png" />
      <h3>Adicionar Membro</h3>
      <form class="form_member" action="/" method="POST">
        <fieldset>
          <input type="text" name="email" placeholder="Email do Usuário" required />
        </fieldset>
        <input type="hidden" value="" name="projectId" class="input_projectid" />
        <button class="button" type="submit">Adicionar Membro</button>
      </form>
    </div>
  </div>
  <script src="../../config.js"></script>
  <script src="../../public/js/effects/notification.js"></script>
  <script src="../../public/js/auth/getcookie.js"></script>
  <script src="../../public/js/effects/loading.js"></script>
  <script src="../../public/js/auth/logout.js"></script>
  <script src="../../public/js/auth/user.js"></script>
  <script src="../../public/js/auth/verify-authenticate.js"></script>
  <script src="../../public/js/api/getProject.js"></script>
  <script src="../../public/js/api/delete_member_in_project.js"></script>
  <script src="../../public/js/project/render-info-project.js"></script>
  <script src="../../public/js/conditional-rendering/user-options-conditional.js"></script>
  <script src="../../public/js/project/render-forms-project.js"></script>
  <script src="../../public/js/private/private-for-user-else-participant-or-lead.js"></script>
  <script src="../../public/js/api/create_group.js"></script>
  <script src="../../public/js/api/add_member_in_project.js"></script>
</body>

</html>
