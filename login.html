<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="public/css/global.css">
  <link rel="stylesheet" href="public/css/login.css">
  <link rel="stylesheet" href="public/css/index.css">
  <title>Login</title>
</head>

<body>
  <div class="form-center">
    <div class="form-container">
      <div class="logo-form">
        <img src="public/assets/logo_without.png" />
      </div>
      <div class="top-form">
        <h2 class="title-form">Jupiter Login</h2>
        <p class="description-form">Entre em sua conta.</p>
      </div>
      <form class="form-login">
        <fieldset>
          <input type="email" name="email" id="email" placeholder="Email" required />
        </fieldset>
        <fieldset>
          <input type="password" name="password" id="password" placeholder="Password" required />
        </fieldset>
        <a class="forgot-password" href="register.html">Não possuo uma conta.</a>
        <button type="submit" class="login-button button-submit">Fazer Login</button>
      </form>
    </div>
  </div>
</body>

</html>
