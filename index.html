<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="public/css/global.css" />
  <link rel="stylesheet" href="public/css/index.css" />
  <link rel="stylesheet" href="public/css/workspace.css" />
  <link rel="stylesheet" href="public/css/section_workspace_options.css" />
  <link rel="stylesheet" href="public/css/tasks.css" />
  <link href='https://css.gg/css' rel='stylesheet'>
  <title>Jupiter</title>
</head>

<body>
  <header>
    <div class="logo">
      <img src="public/assets/jupiter_logo.png" />
    </div>
    <div class="user-options">
      <a class="button" href="login.html">
        Entre
      </a>
    </div>
  </header>
  <main>
    <section class="workspace_section">
      <div>
        <button class="btn_create_workspace button"><i class="gg-math-plus"></i>Criar Workspace</button>
      </div>
    </section>
    <section class="workspaces">
      <h2>Workspaces</h2>
      <div class="workspaces-card">
        <a class="workspace" href="workspace">
          <i class="gg-folder"></i>
          <h3>Empresa</h3>
        </a>
        <a class="workspace" href="workspace">
          <i class="gg-folder"></i>
          <h3>Pessoal</h3>
        </a>
        <a class="workspace" href="workspace">
          <i class="gg-folder"></i>
          <h3>Negócios</h3>
        </a>
        <a class="workspace" href="workspace">
          <i class="gg-folder"></i>
          <h3>Desenvolvimento</h3>
        </a>
      </div>
    </section>
    <section>
      <section class="tasks">
        <h2>Tasks</h2>
        <div class="tasks-card">
          <a class="task" href="project">
            <i class="gg-calendar"></i>
            <h3>Criar Rota</h3>
          </a>
          <a class="task" href="project">
            <i class="gg-calendar"></i>
            <h3>Criar Pasts</h3>
          </a>
          <a class="task" href="project">
            <i class="gg-calendar"></i>
            <h3>Mudar Layout</h3>
          </a>
          <a class="task" href="project">
            <i class="gg-calendar"></i>
            <h3>Fazer JWT</h3>
          </a>
        </div>
      </section>
    </section>
  </main>
</body>

</html>
