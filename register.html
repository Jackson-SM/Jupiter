<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="public/css/global.css">
  <link rel="stylesheet" href="public/css/register.css">
  <link rel="stylesheet" href="public/css/index.css">
  <title>Register</title>
</head>

<body>
  <div class="form-center">
    <div class="form-container">
      <div class="logo-form">
        <img src="public/assets/logo_without.png" />
      </div>
      <div class="top-form">
        <h2 class="title-form">Jupiter Registro</h2>
        <p class="description-form">Crie sua conta.</p>
      </div>
      <form class="form-register">
        <fieldset>
          <input type="text" name="firstName" id="first-name" placeholder="First Name" required />
        </fieldset>
        <fieldset>
          <input type="text" name="lastName" id="last-name" placeholder="Last Name" required />
        </fieldset>
        <fieldset>
          <input type="email" name="email" id="email" placeholder="Email" required />
        </fieldset>
        <fieldset>
          <input type="password" name="password" id="password" placeholder="Password" required />
        </fieldset>
        <a class="forgot-password" href="login.html">Já possuo uma conta.</a>
        <button type="submit" class="button button-submit">Registrar Conta</button>
      </form>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="public/js/auth/setcookie.js"></script>
  <script src="public/js/auth/getcookie.js"></script>
  <script src="public/js/api/register.js"></script>
  <script src="public/js/effects/notification.js"></script>
  <script src="public/js/auth/user.js"></script>
  <script src="public/js/private/private-for-users.js"></script>
</body>

</html>
